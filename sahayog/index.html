<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR Portal</title>
  <meta name="description" content="HR Portal – Employee & Admin Portal" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style2.css" />
</head>
<body>

<!-- LOGIN PAGE -->
<div id="login-page" class="login-page">
  <div class="login-bg-anim"></div>
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">HR</div>
      <span class="logo-text">HR Portal</span>
    </div>
    <h2>Welcome Back</h2>
    <p class="login-sub">Sign in to your account. Use 'admin@company.com' for Admin Portal.</p>
    <div class="form-group">
      <label>Email Address</label>
      <input id="login-email" type="text" placeholder="e.g. john@company.com or admin@company.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input id="login-pass" type="password" placeholder="••••••••" />
    </div>
    <button class="btn-primary full-width" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="app hidden">
  <header class="topbar">
    <div class="topbar-left">
      <button class="sidebar-toggle" onclick="toggleSidebar()" id="sidebar-toggle-btn">☰</button>
      <div class="portal-brand">
        <div class="logo-icon sm">HR</div>
        <span id="portal-title">HR Portal</span>
      </div>
    </div>
    <div class="topbar-center">
      <div class="search-wrap">
        <input type="text" placeholder="Search menu…" id="global-search" oninput="globalSearch(this.value)" />
        <span class="search-icon">🔍</span>
        <div class="search-results" id="search-results"></div>
      </div>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" title="Notifications" onclick="toggleNotifs()">🔔<span class="badge" id="notif-badge">3</span></button>
      <div class="avatar-wrap" onclick="navigate('profile')">
        <div class="avatar" id="topbar-avatar">U</div>
        <span class="avatar-name" id="topbar-name">User</span>
      </div>
    </div>
  </header>

  <div class="notif-panel hidden" id="notif-panel">
    <div class="notif-header">Notifications <button onclick="toggleNotifs()">✕</button></div>
    <div class="notif-item unread"><span>🟢</span> System updated successfully</div>
  </div>

  <div class="layout">
    <nav class="sidebar" id="sidebar">
      <ul class="nav-list" id="sidebar-nav">
        <!-- Injected via JS -->
      </ul>
      <div class="sidebar-footer">
        <button class="btn-logout" onclick="doLogout()">⏻ Sign Out</button>
      </div>
    </nav>

    <main class="main-content" id="main-content">
      <!-- Pages injected by JS -->
    </main>
  </div>
</div>

<script src="app3.js?v=4"></script>
</body>
</html>
